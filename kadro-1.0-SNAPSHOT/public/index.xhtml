<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/main-template.xhtml">

    <ui:define name="title">#{msg['menu.start']}</ui:define>

    <ui:define name="content">

        <p:panel styleClass="card" style="padding:6px 2px;">
            <h2 style="margin:0 0 10px 0;">#{msg['menu.start']}</h2>

            <h:panelGroup rendered="#{not empty remoteClient.details}">
                <div style="margin-top:6px;">
                    #{msg['auth.loggedAs']}: <b>#{remoteClient.details.accName}</b>
                </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{empty remoteClient.details}">
                <div style="margin-top:6px; opacity:.85;">
                    #{msg['emp.clock.loginRequired']}
                </div>
            </h:panelGroup>

        </p:panel>

    </ui:define>
</ui:composition>
