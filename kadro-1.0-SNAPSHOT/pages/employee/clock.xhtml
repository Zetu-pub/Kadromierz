<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/main-template.xhtml">

    <ui:define name="title">#{msg['emp.clock.title']}</ui:define>

    <ui:define name="content">

        <h:panelGroup rendered="#{empty remoteClient.details}">
            <div style="padding:12px;border:1px solid #fca5a5;border-radius:12px;background:#fee2e2;">
                #{msg['emp.clock.loginRequired']}
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{not empty remoteClient.details}">
            <h2>#{msg['emp.clock.title']}</h2>

            <h:form id="clockForm">
                <p:commandButton value="#{msg['emp.clock.start']}"
                                 icon="pi pi-play"
                                 action="#{shiftBB.start}"
                                 update="clockForm table"
                                 disabled="#{not shiftBB.employee or not empty shiftBB.openShift}" />

                <p:commandButton value="#{msg['emp.clock.end']}"
                                 icon="pi pi-stop"
                                 styleClass="ui-button-danger"
                                 style="margin-left:.5rem;"
                                 action="#{shiftBB.end}"
                                 update="clockForm table"
                                 disabled="#{not shiftBB.employee or empty shiftBB.openShift}" />

                <div style="margin-top:1rem;">
                    <b>#{msg['emp.clock.status']}:</b>
                    <h:outputText value=" #{msg['emp.clock.inProgress']}" rendered="#{not empty shiftBB.openShift}" />
                    <h:outputText value=" #{msg['emp.clock.none']}" rendered="#{empty shiftBB.openShift}" />
                </div>
            </h:form>

            <h2 style="margin-top:1.2rem;">#{msg['emp.clock.myShifts']}</h2>

            <h:form id="table">
                <p:dataTable value="#{shiftBB.myShifts}" var="s"
                             rows="10" paginator="true"
                             emptyMessage="#{msg['emp.clock.empty']}"
                             style="width:100%;">

                    <p:column headerText="#{msg['emp.shift.start']}">
                        <h:outputText value="#{s.startTime}">
                            <f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss"/>
                        </h:outputText>
                    </p:column>

                    <p:column headerText="#{msg['emp.shift.end']}">
                        <h:outputText value="#{s.endTime}" rendered="#{not empty s.endTime}">
                            <f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss"/>
                        </h:outputText>
                        <h:outputText value="#{msg['emp.shift.inProgress']}" rendered="#{empty s.endTime}"/>
                    </p:column>

                </p:dataTable>
            </h:form>
        </h:panelGroup>

    </ui:define>
</ui:composition>
