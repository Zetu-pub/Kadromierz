<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/main-template.xhtml">

    <ui:define name="title">#{msg['auth.login']}</ui:define>

    <ui:define name="content">

        <div class="surface-card p-4 border-round-2xl shadow-2" style="max-width:520px;">
            <h2 style="margin-top:0;">#{msg['auth.login']}</h2>

            <!-- ✅ poprawnie dla Twojej wersji PrimeFaces -->
            <p:messages id="msgs" showDetail="true" closable="true" />
            <p:autoUpdate />

            <h:form id="loginForm">
                <div class="grid">

                    <div class="col-12">
                        <h:outputLabel value="#{msg['common.username']}" />
                        <p:inputText value="#{loginBB.username}"
                                     style="width:100%; margin-top:6px;" />
                    </div>

                    <div class="col-12">
                        <h:outputLabel value="#{msg['common.password']}" />
                        <p:password value="#{loginBB.password}"
                                    feedback="false"
                                    style="width:100%; margin-top:6px;" />
                    </div>

                    <div class="col-12" style="margin-top:10px;">
                        <p:commandButton value="#{msg['auth.login']}"
                                         action="#{loginBB.doLogin}"
                                         ajax="false"
                                         icon="pi pi-sign-in"
                                         style="width:100%;"/>
                    </div>
                </div>
            </h:form>
        </div>

    </ui:define>
</ui:composition>
