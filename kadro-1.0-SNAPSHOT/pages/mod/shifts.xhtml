<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/main-template.xhtml">

    <ui:define name="title">#{msg['mod.shifts.title']}</ui:define>

    <ui:define name="content">

        <!-- zabezpieczenie -->
        <h:panelGroup rendered="#{!shiftBB.isModerator()}">
            <div style="padding:12px;border:1px solid #fca5a5;border-radius:12px;background:#fee2e2;">
                #{msg['mod.noPermission']}
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{shiftBB.isModerator()}">

            <h2>#{msg['mod.shifts.title']}</h2>

            <h:form>
                <p:dataTable value="#{shiftBB.allShifts}"
                             var="s"
                             paginator="true"
                             rows="10"
                             emptyMessage="#{msg['mod.shifts.empty']}">

                    <p:column headerText="#{msg['common.id']}" width="60">
                        #{s.id}
                    </p:column>

                    <p:column headerText="#{msg['common.employee']}">
                        #{s.userId.username}
                    </p:column>

                    <p:column headerText="#{msg['common.start']}">
                        <h:outputText value="#{s.startTime}">
                            <f:convertDateTime pattern="yyyy-MM-dd HH:mm"/>
                        </h:outputText>
                    </p:column>

                    <p:column headerText="#{msg['common.end']}">
                        <h:outputText value="#{s.endTime}">
                            <f:convertDateTime pattern="yyyy-MM-dd HH:mm"/>
                        </h:outputText>
                    </p:column>

                    <p:column headerText="#{msg['common.status']}">
                        <h:outputText value="#{msg['status.open']}"
                                      rendered="#{empty s.endTime}"
                                      style="font-weight:bold;color:#e67e22"/>

                        <h:outputText value="#{msg['status.closed']}"
                                      rendered="#{not empty s.endTime}"
                                      style="color:#27ae60"/>
                    </p:column>

                </p:dataTable>
            </h:form>

        </h:panelGroup>

    </ui:define>
</ui:composition>
